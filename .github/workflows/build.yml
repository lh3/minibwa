name: build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: macos-15-intel
            arch: x64
          - os: macos-latest
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - run: make -j$(nproc || sysctl -n hw.ncpu)
      - run: make -j$(nproc || sysctl -n hw.ncpu) -C api-test

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # 1. Install coverage tools
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      # 2. Build with coverage instrumentation
      - name: Build with coverage flags
        run: |
          make clean || true
          make CFLAGS+=' -fprofile-arcs -ftest-coverage -fprofile-update=atomic -O0' \
              LDFLAGS+=' -fprofile-arcs -fprofile-update=atomic'
          make -C api-test \
              CFLAGS+=' -fprofile-arcs -ftest-coverage -fprofile-update=atomic -O0' \
              LDFLAGS+=' -fprofile-arcs -fprofile-update=atomic'

      # 3. Clear old coverage data and run all tests
      - name: Run all tests
        run: |
          lcov --zerocounters --directory .
          lcov --capture --directory . --initial --output-file coverage.base

          bash test/run-tests.sh
          bash test/test-api.sh
          bash test/test-bisulfite.sh
          bash test/test-index-routines.sh
          bash test/test-utils.sh

          lcov --capture --directory . --output-file coverage.full
          lcov -a coverage.base -a coverage.full -o coverage.info

      # 4. Filter coverage to only include minibwa source files
      - name: Filter coverage
        run: |
          lcov --remove coverage.info \
            '/usr/*' '*libsais*' '*ksw2*' '*mimalloc*' '*api-test*' '*test/*' \
            --output-file coverage.filtered \
            --ignore-errors unused

      # 5. Generate HTML report and coverage badge data
      - name: Generate coverage report
        id: coverage
        run: |
          genhtml coverage.filtered --output-directory coverage \
            --title "Minibwa Coverage" \
            --legend

          # Extract coverage percentage
          TOTAL=$(lcov --summary coverage.filtered | sed -n 's/^  lines.*: *\([0-9.]*\)%.*/\1/p' | head -n1)
          echo "coverage=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "Coverage: $TOTAL%"

          # Save coverage percentage as a plain text file for the README badge
          echo "$TOTAL" > coverage/coverage.txt

      # 6. Upload coverage artifact
      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

